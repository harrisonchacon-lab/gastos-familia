name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix libffi and Cython
        run: |
          apt-get update -qq
          apt-get install -y libffi-dev autoconf automake libtool
          pip install "cython==0.29.37"

      - name: Create buildozer.spec
        run: |
          yes | buildozer init
          sed -i 's/title = My Application/title = Gastos Familia/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = gastosfamilia/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.harrison/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0/' buildozer.spec
          sed -i 's/#android.api = 31/android.api = 33/' buildozer.spec
          sed -i 's/#android.minapi = 21/android.minapi = 21/' buildozer.spec
          sed -i 's/#log_level = 2/log_level = 2/' buildozer.spec
          sed -i 's/p4a.branch = master/p4a.branch = develop/' buildozer.spec

      - name: Build APK
        run: |
          yes | buildozer android debug
          ls -la bin/ || echo "No bin folder"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gastos-familia-apk
          path: bin/*.apk
