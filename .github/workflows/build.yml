name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config libffi-dev cmake \
            zlib1g-dev libssl-dev adb
          pip install buildozer cython setuptools

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android tools
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          buildozer init
          sed -i 's/title = My Application/title = Gastos Familia/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = gastosfamilia/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.harrison/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0/' buildozer.spec
          sed -i 's/#android.api = 31/android.api = 33/' buildozer.spec
          sed -i 's/#android.minapi = 21/android.minapi = 21/' buildozer.spec
          sed -i 's/#android.build_tools_version = .*/android.build_tools_version = 33.0.2/' buildozer.spec
          sed -i 's/#android.skip_update = False/android.skip_update = True/' buildozer.spec
          mkdir -p ~/.buildozer/android/platform/
          ln -sfn $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gastos-familia-apk
          path: bin/*.apk
